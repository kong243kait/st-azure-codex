<div id="azure-codex-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Azure Codex – NPC & Player Tracker</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label" for="azure_codex_auto_detect">
                    <input id="azure_codex_auto_detect" type="checkbox" checked />
                    <span>Auto-detect NPCs from messages</span>
                </label>
                <label class="checkbox_label" for="azure_codex_auto_detect_stats">
                    <input id="azure_codex_auto_detect_stats" type="checkbox" checked />
                    <span>Auto-detect player stats from messages</span>
                </label>
                <label class="checkbox_label" for="azure_codex_show_float_btn">
                    <input id="azure_codex_show_float_btn" type="checkbox" checked />
                    <span>Show floating button</span>
                </label>
                <hr />
                <div class="flex-container">
                    <button id="azure_codex_open_panel" class="menu_button">
                        <i class="fa-solid fa-compass"></i>
                        <span>Open Azure Codex</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
